[package]
name = "terax"
version = "0.7.28-jatique-73"
description = "Terax â€” an open-source AI-native terminal emulator"
authors = ["crynta"]
license = "Apache-2.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "terax_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-opener = "2"
tauri-plugin-clipboard = "2.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.9"
dirs = "5"
md5 = "0.7"
log = "0.4"
ignore = "0.4"
grep-regex = "0.1"
grep-searcher = "0.1"
grep-matcher = "0.1"
globset = "0.4"
shared_child = "1"
tauri-plugin-log = "2"
tauri-plugin-os = "2"
tauri-plugin-store = "2"
tauri-plugin-process = "2"
tauri-plugin-notification = "2"
reqwest = { version = "0.12", default-features = false, features = [
	"rustls-tls",
	"stream",
] }
bytes = "1"
futures-util = "0.3"
tokio = { version = "1", default-features = false, features = [
	"rt",
	"rt-multi-thread",
	"net",
	"sync",
	"time",
] }
# LAN broadcast server. Shares hyper/tower/tokio with reqwest, so the added
# weight is the axum layer alone.
axum = { version = "0.8", default-features = false, features = [
	"http1",
	"json",
	"query",
	"tokio",
] }
getrandom = "0.3"
tempfile = "3"
notify = "8.2.0"
# Reads Cursor CLI's `store.db` transcripts. Bundled so we don't depend on a
# system libsqlite3 (matters most for the Windows/macOS release builds).
rusqlite = { version = "0.32", features = ["bundled"] }

[dev-dependencies]
proptest = "1"
tower = { version = "0.5", features = ["util"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
keyring = { version = "3.6", default-features = false, features = [
	"apple-native",
] }

[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3.6", default-features = false, features = [
	"windows-native",
] }
windows-sys = { version = "0.59", features = [
	"Win32_Foundation",
	"Win32_Security",
	"Win32_System_JobObjects",
	"Win32_System_Threading",
] }

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-autostart = "2"
tauri-plugin-updater = "2"
tauri-plugin-window-state = "2"

# Vendored portable-pty with PSUEDOCONSOLE_INHERIT_CURSOR removed from
# CreatePseudoConsole. That flag triggers the Windows ClosePseudoConsole
# teardown deadlock (microsoft/terminal#17688) on builds < 11 24H2, which froze
# new terminals while the ConPTY lifecycle lock was held. See
# vendor/portable-pty/src/win/psuedocon.rs and modules/pty/session.rs.
[patch.crates-io]
portable-pty = { path = "vendor/portable-pty" }

[profile.dev]
incremental = true

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = "s"
panic = "abort"
strip = true
